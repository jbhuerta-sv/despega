<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia Despega</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --azul:#0f2a4a;
    --azul-claro:#1d4e7e;
    --fondo:#f3f5f8;
    --panel:#ffffff;
    --verde:#16a34a;
    --verde-suave:#e7f6ec;
    --rojo:#dc2626;
    --rojo-suave:#fdeaea;
    --texto:#1c2733;
    --texto-suave:#5b6b7b;
    --borde:#dde4ec;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--fondo);color:var(--texto);
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
  }

  /* ===== Encabezado ===== */
  header{
    background:var(--azul);color:#fff;
    padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  header h1{font-size:17px;font-weight:600;letter-spacing:.3px}
  header .sub{font-size:12px;opacity:.75}
  .header-derecha{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .btn{
    background:#fff;color:var(--azul);border:none;border-radius:6px;
    padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{background:#e8eef5}
  .btn:disabled{opacity:.6;cursor:wait}
  .btn .icono{display:inline-block;transition:transform .4s}
  .btn.cargando .icono{animation:girar 1s linear infinite}
  @keyframes girar{to{transform:rotate(360deg)}}
  select.auto{
    background:var(--azul-claro);color:#fff;border:1px solid rgba(255,255,255,.3);
    border-radius:6px;padding:7px 8px;font-size:12px;cursor:pointer;
  }
  .ultima{font-size:11px;opacity:.8}

  /* ===== Tarjetas resumen ===== */
  .resumen{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;padding:12px 18px;background:var(--fondo);
  }
  .tarjeta{
    background:var(--panel);border:1px solid var(--borde);border-radius:10px;
    padding:10px 14px;
  }
  .tarjeta .valor{font-size:24px;font-weight:700;line-height:1.1}
  .tarjeta .etiqueta{font-size:11px;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .tarjeta.verde .valor{color:var(--verde)}
  .tarjeta.rojo .valor{color:var(--rojo)}
  .tarjeta.azul .valor{color:var(--azul-claro)}

  /* ===== Cuerpo: barra lateral + mapa ===== */
  .cuerpo{flex:1;display:flex;min-height:0}
  aside{
    width:340px;min-width:260px;background:var(--panel);
    border-right:1px solid var(--borde);display:flex;flex-direction:column;
  }
  .controles{padding:10px;border-bottom:1px solid var(--borde);display:flex;flex-direction:column;gap:8px}
  .controles input{
    width:100%;padding:8px 10px;border:1px solid var(--borde);border-radius:6px;font-size:13px;
  }
  .filtros{display:flex;gap:6px}
  .chip{
    flex:1;border:1px solid var(--borde);background:#fff;border-radius:6px;
    padding:6px 4px;font-size:11.5px;cursor:pointer;text-align:center;color:var(--texto-suave);
  }
  .chip.activo{background:var(--azul);color:#fff;border-color:var(--azul)}
  .lista{flex:1;overflow-y:auto}
  .item{
    padding:9px 12px;border-bottom:1px solid var(--borde);cursor:pointer;
    display:flex;gap:9px;align-items:flex-start;
  }
  .item:hover{background:#f0f4f9}
  .punto{
    width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;
  }
  .punto.ok{background:var(--verde)}
  .punto.sin{background:var(--rojo)}
  .item .nombre{font-size:12.5px;font-weight:600;line-height:1.25}
  .item .detalle{font-size:11px;color:var(--texto-suave);margin-top:2px}
  .item .codigo{font-size:10px;color:var(--texto-suave)}
  .item .cifras{margin-left:auto;text-align:right;flex-shrink:0}
  .item .cifras .asis{font-size:14px;font-weight:700}
  .item .cifras .asis.ok{color:var(--verde)}
  .item .cifras .asis.sin{color:var(--rojo)}
  .item .cifras .tot{font-size:10px;color:var(--texto-suave)}
  .vacio{padding:24px;text-align:center;color:var(--texto-suave);font-size:13px}

  #mapa{flex:1;min-width:0}

  /* ===== Estado / errores ===== */
  .aviso{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    background:var(--rojo);color:#fff;padding:8px 16px;border-radius:8px;
    font-size:13px;z-index:2000;display:none;max-width:90%;
  }

  /* ===== Leyenda ===== */
  .leyenda{
    background:#fff;padding:8px 12px;border-radius:8px;
    box-shadow:0 1px 5px rgba(0,0,0,.25);font-size:12px;line-height:1.7;
  }
  .leyenda .punto{display:inline-block;margin-right:6px;margin-top:0;vertical-align:middle}

  @media (max-width:760px){
    .cuerpo{flex-direction:column}
    aside{width:100%;max-height:40%;border-right:none;border-top:1px solid var(--borde);order:2}
    #mapa{order:1;min-height:300px}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Tablero de Asistencia Despega</h1>
    <div class="sub">Reporte en tiempo real</div>
  </div>
  <div class="header-derecha">
    <span class="ultima" id="ultima">Sin datos cargados</span>
    <select class="auto" id="autoRefresco" title="Actualización automática">
      <option value="0">Auto: apagado</option>
      <option value="60" selected>Auto: cada 1 min</option>
      <option value="300">Auto: cada 5 min</option>
      <option value="600">Auto: cada 10 min</option>
    </select>
    <button class="btn" id="btnActualizar">
      <span class="icono">⟳</span> Actualizar datos
    </button>
  </div>
</header>

<div class="resumen">
  <div class="tarjeta azul"><div class="valor" id="numEscuelas">–</div><div class="etiqueta">Escuelas</div></div>
  <div class="tarjeta"><div class="valor" id="numInscritos">–</div><div class="etiqueta">Estudiantes inscritos</div></div>
  <div class="tarjeta verde"><div class="valor" id="numAsistentes">–</div><div class="etiqueta">Asistentes reportados</div></div>
  <div class="tarjeta verde"><div class="valor" id="escuelasReportan">–</div><div class="etiqueta">Escuelas con asistencia</div></div>
  <div class="tarjeta rojo"><div class="valor" id="escuelasSin">–</div><div class="etiqueta">Escuelas sin asistencia</div></div>
  <div class="tarjeta azul"><div class="valor" id="pctAsistencia">–</div><div class="etiqueta">% de asistencia</div></div>
</div>

<div class="cuerpo">
  <aside>
    <div class="controles">
      <input type="text" id="buscar" placeholder="Buscar escuela o código…">
      <div class="filtros">
        <div class="chip activo" data-f="todas">Todas</div>
        <div class="chip" data-f="ok">Con asistencia</div>
        <div class="chip" data-f="sin">Sin asistencia</div>
      </div>
    </div>
    <div class="lista" id="lista"><div class="vacio">Cargando datos…</div></div>
  </aside>
  <div id="mapa"></div>
</div>

<div class="aviso" id="aviso"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ================= CONFIGURACIÓN ================= */
const SHEET_ID = "1NvsVz_Lob50l2947__NPAf0_oauRuAM2UK7NUsbyOG8";
const SHEET_NOMBRE = "Hoja 1";
// Endpoints gviz (requieren que el archivo sea público / "cualquiera con el enlace")
const BASE_GVIZ = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NOMBRE)}`;
const URL_JSON = BASE_GVIZ + "&tqx=out:json";
const URL_CSV  = BASE_GVIZ + "&tqx=out:csv";

/* ================= ESTADO ================= */
let escuelas = [];          // datos parseados
let marcadores = {};        // codigo -> marker
let filtroActual = "todas";
let textoBusqueda = "";
let temporizador = null;

/* ================= MAPA ================= */
const mapa = L.map("mapa").setView([13.70, -89.15], 10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "&copy; OpenStreetMap"
}).addTo(mapa);
const capaMarcadores = L.layerGroup().addTo(mapa);

// Leyenda
const leyenda = L.control({position:"bottomright"});
leyenda.onAdd = function(){
  const div = L.DomUtil.create("div","leyenda");
  div.innerHTML =
    '<span class="punto ok" style="width:10px;height:10px;border-radius:50%;background:#16a34a"></span> Con asistencia reportada<br>' +
    '<span class="punto sin" style="width:10px;height:10px;border-radius:50%;background:#dc2626"></span> Sin asistencia (0)';
  return div;
};
leyenda.addTo(mapa);

/* ================= CARGA DE DATOS ================= */
async function cargarDatos(){
  const btn = document.getElementById("btnActualizar");
  btn.disabled = true; btn.classList.add("cargando");
  ocultarAviso();

  let datos = null;
  let ultimoError = null;

  // Método 1: fetch del JSON gviz
  try{ datos = parsearGviz(extraerJsonGviz(await fetchTexto(URL_JSON))); }
  catch(e){ ultimoError = e; console.warn("Método JSON falló:", e.message); }

  // Método 2: fetch del CSV gviz
  if(!datos || datos.length === 0){
    try{ datos = parsearCSV(await fetchTexto(URL_CSV)); }
    catch(e){ ultimoError = e; console.warn("Método CSV falló:", e.message); }
  }

  // Método 3: JSONP — carga el gviz como <script>, no está sujeto a CORS
  if(!datos || datos.length === 0){
    try{ datos = parsearGviz(await cargarViaJsonp()); }
    catch(e){ ultimoError = e; console.warn("Método JSONP falló:", e.message); }
  }

  if(datos && datos.length > 0){
    escuelas = datos;
    pintarTodo();
    document.getElementById("ultima").textContent =
      "Última actualización: " + new Date().toLocaleTimeString("es-SV", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
  }else{
    console.error(ultimoError);
    mostrarAviso("No se pudieron cargar los datos por ningún método. " +
      "Si está viendo este archivo dentro del visor de Claude, descárguelo y ábralo directamente en Chrome o Edge (doble clic). " +
      "Detalle: " + (ultimoError ? ultimoError.message : "desconocido"));
    if(escuelas.length === 0){
      document.getElementById("lista").innerHTML = '<div class="vacio">No hay datos disponibles.</div>';
    }
  }
  btn.disabled = false; btn.classList.remove("cargando");
}

async function fetchTexto(url){
  const resp = await fetch(url + "&_=" + Date.now(), {cache:"no-store"});
  if(!resp.ok) throw new Error("HTTP " + resp.status);
  return await resp.text();
}

function extraerJsonGviz(texto){
  // gviz envuelve el JSON: google.visualization.Query.setResponse({...});
  const inicio = texto.indexOf("{");
  const fin = texto.lastIndexOf("}");
  if(inicio < 0 || fin < 0) throw new Error("Respuesta gviz no reconocida");
  const json = JSON.parse(texto.substring(inicio, fin + 1));
  if(json.status === "error") throw new Error(json.errors?.[0]?.detailed_message || "Error de gviz");
  return json;
}

function cargarViaJsonp(){
  // El gviz responde con: google.visualization.Query.setResponse({...})
  // Al cargarlo como <script> el navegador lo ejecuta sin restricciones CORS.
  return new Promise((resolver, rechazar)=>{
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    window.google.visualization.Query.setResponse = function(json){
      limpiar();
      if(json.status === "error"){
        rechazar(new Error(json.errors?.[0]?.detailed_message || "Error de gviz"));
      }else{
        resolver(json);
      }
    };
    const script = document.createElement("script");
    script.src = URL_JSON + "&_=" + Date.now();
    script.onerror = ()=>{ limpiar(); rechazar(new Error("No se pudo cargar el script de Google Sheets (¿sin conexión o bloqueado?)")); };
    const tiempo = setTimeout(()=>{ limpiar(); rechazar(new Error("Tiempo de espera agotado (JSONP)")); }, 15000);
    function limpiar(){
      clearTimeout(tiempo);
      if(script.parentNode) script.parentNode.removeChild(script);
    }
    document.head.appendChild(script);
  });
}

function parsearCSV(texto){
  const lineas = texto.split(/\r?\n/).filter(l=>l.trim()!=="");
  if(lineas.length < 2) return [];
  const filas = lineas.map(divideCSV);
  const cab = filas[0].map(c=>c.trim().toUpperCase());
  const idx = {
    codigo: indiceCol(cab, ["CODIGO SEDE","CODIGO CE","CODIGO"], 0),
    nombre: indiceCol(cab, ["CENTRO ESCOLAR","NOMBRE"], 1),
    total:  indiceCol(cab, ["TOTAL ESTUDIANTES","TOTAL"], 2),
    asistencia: indiceCol(cab, ["ASISTENCIA"], 3),
    lat: indiceCol(cab, ["LATITUDE","LATITUD","LAT"], 4),
    lng: indiceCol(cab, ["LONGITUDE","LONGITUD","LNG","LON"], 5)
  };
  const datos = [];
  for(let i=1;i<filas.length;i++){
    const f = filas[i];
    const lat = parseFloat(f[idx.lat]);
    const lng = parseFloat(f[idx.lng]);
    if(!f[idx.codigo] || !f[idx.nombre] || isNaN(lat) || isNaN(lng)) continue;
    datos.push({
      codigo: String(f[idx.codigo]).trim(),
      nombre: String(f[idx.nombre]).trim(),
      total: Number(f[idx.total]) || 0,
      asistencia: Number(f[idx.asistencia]) || 0,
      lat, lng
    });
  }
  return datos;
}

function divideCSV(linea){
  const campos = []; let actual = ""; let enComillas = false;
  for(let i=0;i<linea.length;i++){
    const ch = linea[i];
    if(ch === '"'){
      if(enComillas && linea[i+1] === '"'){ actual += '"'; i++; }
      else enComillas = !enComillas;
    }else if(ch === "," && !enComillas){
      campos.push(actual); actual = "";
    }else{
      actual += ch;
    }
  }
  campos.push(actual);
  return campos;
}

function parsearGviz(json){
  const filas = json.table.rows || [];
  const cols = (json.table.cols || []).map(c => (c.label || "").trim().toUpperCase());
  // Detectar índices por nombre de columna; si no hay etiquetas, usar orden fijo
  const idx = {
    codigo: indiceCol(cols, ["CODIGO SEDE","CODIGO CE","CODIGO"], 0),
    nombre: indiceCol(cols, ["CENTRO ESCOLAR","NOMBRE"], 1),
    total:  indiceCol(cols, ["TOTAL ESTUDIANTES","TOTAL"], 2),
    asistencia: indiceCol(cols, ["ASISTENCIA"], 3),
    lat: indiceCol(cols, ["LATITUDE","LATITUD","LAT"], 4),
    lng: indiceCol(cols, ["LONGITUDE","LONGITUD","LNG","LON"], 5)
  };
  const datos = [];
  for(const f of filas){
    const c = f.c || [];
    const val = i => (c[i] && c[i].v !== null && c[i].v !== undefined) ? c[i].v : null;
    const codigo = val(idx.codigo);
    const nombre = val(idx.nombre);
    const lat = parseFloat(val(idx.lat));
    const lng = parseFloat(val(idx.lng));
    if(codigo === null || !nombre || isNaN(lat) || isNaN(lng)) continue;
    datos.push({
      codigo: String(codigo),
      nombre: String(nombre),
      total: Number(val(idx.total)) || 0,
      asistencia: Number(val(idx.asistencia)) || 0,
      lat, lng
    });
  }
  return datos;
}

function indiceCol(cols, candidatos, porDefecto){
  for(const cand of candidatos){
    const i = cols.indexOf(cand);
    if(i >= 0) return i;
  }
  return porDefecto;
}

/* ================= RENDER ================= */
function pintarTodo(){
  pintarResumen();
  pintarMapa();
  pintarLista();
}

function pintarResumen(){
  const nEsc = escuelas.length;
  const inscritos = escuelas.reduce((s,e)=>s+e.total,0);
  const asistentes = escuelas.reduce((s,e)=>s+e.asistencia,0);
  const conAsis = escuelas.filter(e=>e.asistencia>0).length;
  const sinAsis = nEsc - conAsis;
  // % de asistencia: solo sobre la matrícula de las escuelas que ya reportaron (asistencia > 0)
  const inscritosReportados = escuelas.filter(e=>e.asistencia>0).reduce((s,e)=>s+e.total,0);
  const pct = inscritosReportados>0 ? (asistentes/inscritosReportados*100) : 0;

  ponerValor("numEscuelas", nEsc.toLocaleString("es-SV"));
  ponerValor("numInscritos", inscritos.toLocaleString("es-SV"));
  ponerValor("numAsistentes", asistentes.toLocaleString("es-SV"));
  ponerValor("escuelasReportan", conAsis.toLocaleString("es-SV"));
  ponerValor("escuelasSin", sinAsis.toLocaleString("es-SV"));
  ponerValor("pctAsistencia", pct.toFixed(1) + " %");
}

function ponerValor(id, v){ document.getElementById(id).textContent = v; }

function pintarMapa(){
  capaMarcadores.clearLayers();
  marcadores = {};
  const visibles = escuelasFiltradas();
  for(const e of visibles){
    const ok = e.asistencia > 0;
    const m = L.circleMarker([e.lat, e.lng], {
      radius: 7,
      color: "#ffffff",
      weight: 1.5,
      fillColor: ok ? "#16a34a" : "#dc2626",
      fillOpacity: 0.92
    });
    const pct = e.total>0 ? (e.asistencia/e.total*100).toFixed(0) : "0";
    m.bindPopup(
      `<strong>${e.nombre}</strong><br>` +
      `Código: ${e.codigo}<br>` +
      `Inscritos: <b>${e.total}</b> · Asistencia: <b style="color:${ok?'#16a34a':'#dc2626'}">${e.asistencia}</b> (${pct}%)`
    );
    m.addTo(capaMarcadores);
    marcadores[e.codigo] = m;
  }
  if(visibles.length > 0){
    const grupo = L.featureGroup(Object.values(marcadores));
    mapa.fitBounds(grupo.getBounds().pad(0.08));
  }
}

function pintarLista(){
  const cont = document.getElementById("lista");
  const visibles = escuelasFiltradas();
  if(visibles.length === 0){
    cont.innerHTML = '<div class="vacio">No hay escuelas que coincidan con el filtro.</div>';
    return;
  }
  // Ordenar: primero las sin asistencia (alerta), luego alfabético
  const orden = [...visibles].sort((a,b)=>{
    const sa = a.asistencia>0?1:0, sb = b.asistencia>0?1:0;
    if(sa!==sb) return sa-sb;
    return a.nombre.localeCompare(b.nombre,"es");
  });
  cont.innerHTML = orden.map(e=>{
    const ok = e.asistencia>0;
    return `<div class="item" data-codigo="${e.codigo}">
      <div class="punto ${ok?"ok":"sin"}"></div>
      <div>
        <div class="nombre">${e.nombre}</div>
        <div class="codigo">Código ${e.codigo}</div>
      </div>
      <div class="cifras">
        <div class="asis ${ok?"ok":"sin"}">${e.asistencia}</div>
        <div class="tot">de ${e.total}</div>
      </div>
    </div>`;
  }).join("");

  cont.querySelectorAll(".item").forEach(el=>{
    el.addEventListener("click", ()=>{
      const m = marcadores[el.dataset.codigo];
      if(m){
        mapa.flyTo(m.getLatLng(), 15, {duration:.8});
        m.openPopup();
      }
    });
  });
}

function escuelasFiltradas(){
  const q = textoBusqueda.toLowerCase();
  return escuelas.filter(e=>{
    if(filtroActual==="ok" && e.asistencia<=0) return false;
    if(filtroActual==="sin" && e.asistencia>0) return false;
    if(q && !e.nombre.toLowerCase().includes(q) && !e.codigo.includes(q)) return false;
    return true;
  });
}

/* ================= AVISOS ================= */
function mostrarAviso(msg){
  const a = document.getElementById("aviso");
  a.textContent = msg; a.style.display = "block";
}
function ocultarAviso(){ document.getElementById("aviso").style.display = "none"; }

/* ================= EVENTOS ================= */
document.getElementById("btnActualizar").addEventListener("click", cargarDatos);

document.getElementById("buscar").addEventListener("input", ev=>{
  textoBusqueda = ev.target.value.trim();
  pintarMapa(); pintarLista();
});

document.querySelectorAll(".chip").forEach(ch=>{
  ch.addEventListener("click", ()=>{
    document.querySelectorAll(".chip").forEach(c=>c.classList.remove("activo"));
    ch.classList.add("activo");
    filtroActual = ch.dataset.f;
    pintarMapa(); pintarLista();
  });
});

document.getElementById("autoRefresco").addEventListener("change", aplicarAutoRefresco);

function aplicarAutoRefresco(){
  if(temporizador){ clearInterval(temporizador); temporizador = null; }
  const seg = parseInt(document.getElementById("autoRefresco").value, 10);
  if(seg > 0){
    temporizador = setInterval(cargarDatos, seg * 1000);
  }
}

/* ================= INICIO ================= */
cargarDatos();
aplicarAutoRefresco(); // arranca con el valor por defecto (cada 1 minuto)
</script>
</body>
</html>
