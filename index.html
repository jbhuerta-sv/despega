<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centros Escolares · El Salvador</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --panel: #f7f8fa;
    --border: #e3e6eb;
    --border-strong: #cdd2d9;
    --text: #1a1f2b;
    --muted: #6b7380;
    --accent: #c8472b;
    --accent-2: #1f6feb;
    --highlight: #fef6e8;
    --shadow: 0 6px 24px rgba(20,30,50,.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: Arial, "Helvetica Neue", Helvetica, "Segoe UI", Calibri, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .brand {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand h1 {
    margin: 0;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.2;
    color: var(--text);
  }
  .brand p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 12px;
  }

  .stats {
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat .label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .stat .value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }
  .stat.schools .value { color: var(--accent); }
  .stat.students .value { color: var(--accent-2); }
  .stat .sub {
    margin-top: 4px;
    font-size: 11px;
    color: var(--muted);
  }

  .search-box {
    padding: 16px 22px 12px;
    border-bottom: 1px solid var(--border);
  }
  .search-box label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .search-input {
    width: 100%;
    background: #fff;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-input:focus {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(31,111,235,.12);
  }
  .search-input::placeholder { color: #98a0ad; }

  .result-count {
    padding: 10px 22px;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .result-count span { color: var(--text); font-weight: 700; }

  .list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .list::-webkit-scrollbar { width: 8px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb { background: #cfd4dc; border-radius: 4px; }
  .list::-webkit-scrollbar-thumb:hover { background: #b4bac4; }

  .item {
    padding: 11px 22px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
  }
  .item:hover { background: var(--panel); }
  .item.active {
    background: var(--highlight);
    border-left: 3px solid var(--accent);
    padding-left: 19px;
  }
  .item .code {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 2px;
  }
  .item .name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 4px;
    color: var(--text);
  }
  .item .meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .item .badge {
    background: #eaf2fe;
    color: var(--accent-2);
    padding: 2px 7px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
  }
  .item.no-results {
    color: var(--muted);
    text-align: center;
    padding: 30px 22px;
    font-size: 13px;
    cursor: default;
  }
  .item.no-results:hover { background: transparent; }

  /* Map */
  .map-area {
    position: relative;
    height: 100vh;
  }
  #map {
    width: 100%;
    height: 100%;
    background: #eef2f6;
  }

  .map-header {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 500;
    background: rgba(255,255,255,.95);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--muted);
    box-shadow: var(--shadow);
  }
  .map-header b { color: var(--text); font-weight: 700; }

  /* Popups */
  .leaflet-popup-content-wrapper {
    background: #fff;
    color: var(--text);
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .leaflet-popup-content {
    margin: 12px 14px;
    font-family: inherit;
    line-height: 1.4;
  }
  .leaflet-popup-tip { background: #fff; }

  .popup-code {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .popup-name {
    font-weight: 700;
    font-size: 14px;
    line-height: 1.3;
    margin-bottom: 10px;
    max-width: 240px;
  }
  .popup-students {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .popup-students .num {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent-2);
  }
  .popup-students .lbl {
    font-size: 12px;
    color: var(--muted);
  }

  /* Markers */
  .school-marker {
    width: 14px;
    height: 14px;
    background: var(--accent);
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 1px rgba(200,71,43,.4), 0 2px 4px rgba(0,0,0,.25);
    transition: transform .15s;
  }
  .school-marker:hover { transform: scale(1.4); }
  .school-marker.active {
    background: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(31,111,235,.35), 0 2px 6px rgba(0,0,0,.3);
    transform: scale(1.5);
  }

  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { max-height: 50vh; }
    .map-area { height: 50vh; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>Centros Escolares</h1>
      <p>El Salvador · Mapa interactivo</p>
    </div>

    <div class="search-box">
      <label for="search">Buscar por código o nombre</label>
      <input id="search" class="search-input" type="text" placeholder="Ej: 11330 o 'Apopa'..." autocomplete="off"/>

    <div class="result-count"><span id="result-num">0</span> resultados</div>

    <div class="list" id="list"></div>

  <div class="map-area">
    <div class="map-header"><b>Vista geográfica</b> · click en marcador para detalles</div>
    <div id="map"></div>
  </div>
</div>

  const totalSchools = schools.length;
  const totalStudents = schools.reduce((s, c) => s + c.students, 0);

  document.getElementById('total-schools').textContent = totalSchools.toLocaleString('es-SV');
  document.getElementById('total-students').textContent = totalStudents.toLocaleString('es-SV');

  // Map
  const map = L.map('map', { zoomControl: true }).setView([13.72, -89.15], 11);

  // OpenStreetMap standard tiles - Open license (ODbL), only requires attribution
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  const markers = {};
  schools.forEach(s => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="school-marker" data-code="${s.code}"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });
    const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
    m.bindPopup(`
      <div class="popup-code">CÓDIGO ${s.code}</div>
      <div class="popup-name">${s.name}</div>
      <div class="popup-students">
        <span class="num">${s.students}</span>
        <span class="lbl">${s.students === 1 ? 'estudiante' : 'estudiantes'}</span>
      </div>
    `);
    m.on('click', () => setActive(s.code));
    markers[s.code] = m;
  });

  const bounds = L.latLngBounds(schools.map(s => [s.lat, s.lng]));
  map.fitBounds(bounds, { padding: [40, 40] });

  // Search + list
  const listEl = document.getElementById('list');
  const searchEl = document.getElementById('search');
  const resultNumEl = document.getElementById('result-num');
  let activeCode = null;

  function renderList(filter = '') {
    const q = filter.trim().toLowerCase();
    const filtered = !q ? schools : schools.filter(s =>
      s.code.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)
    );

    resultNumEl.textContent = filtered.length;
    listEl.innerHTML = '';

    if (filtered.length === 0) {
      const div = document.createElement('div');
      div.className = 'item no-results';
      div.textContent = 'Sin coincidencias';
      listEl.appendChild(div);
      return;
    }

    filtered.forEach(s => {
      const div = document.createElement('div');
      div.className = 'item' + (s.code === activeCode ? ' active' : '');
      div.dataset.code = s.code;
      div.innerHTML = `
        <div class="code">${s.code}</div>
        <div class="name">${s.name}</div>
        <div class="meta"><span class="badge">${s.students}</span> ${s.students === 1 ? 'estudiante' : 'estudiantes'}</div>
      `;
      div.addEventListener('click', () => {
        setActive(s.code);
        map.flyTo([s.lat, s.lng], 16, { duration: 0.8 });
        markers[s.code].openPopup();
      });
      listEl.appendChild(div);
    });
  }

  function setActive(code) {
    activeCode = code;
    document.querySelectorAll('.item').forEach(el => {
      el.classList.toggle('active', el.dataset.code === code);
      if (el.dataset.code === code) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    });
    document.querySelectorAll('.school-marker').forEach(el => {
      el.classList.toggle('active', el.dataset.code === code);
    });
  }

  searchEl.addEventListener('input', e => renderList(e.target.value));
  renderList();
</script>
